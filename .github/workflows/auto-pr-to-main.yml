name: Auto PR develop → main

# A chaque push sur develop, cree (ou met a jour) une PR vers main.
#
# IMPORTANT: auto-merge est DESACTIVE depuis Epic 4 (UI client).
# Raison : les ecrans client en cours de dev ne doivent PAS partir
# en prod tant que le user n'a pas valide visuellement le preview
# Vercel. Le merge final main est manuel.
#
# Workflow attendu :
#   1. Push develop -> preview Vercel auto
#   2. PR develop -> main ouverte ici (pas de merge auto)
#   3. CI tournent (typecheck + tests + lint)
#   4. User valide visuellement sur preview URL
#   5. Optionnel : /ultrareview avant merge
#   6. User clique "Merge" sur la PR
#   7. Vercel auto-deploy prod sur main

on:
  push:
    branches: [develop]
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  open-or-update-pr:
    name: Ensure PR develop → main exists
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create or update PR
        id: open-pr
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo  = context.repo.repo;

            // Cherche une PR ouverte develop -> main
            const { data: existing } = await github.rest.pulls.list({
              owner, repo, state: 'open', head: `${owner}:develop`, base: 'main',
            });

            // Recupere les commits develop pas encore sur main pour le body
            const { data: comparison } = await github.rest.repos.compareCommits({
              owner, repo, base: 'main', head: 'develop',
            });

            const commitList = comparison.commits
              .map(c => `- ${c.commit.message.split('\n')[0]} (${c.sha.substring(0, 7)})`)
              .join('\n');

            const body = [
              '## Auto-PR develop → main',
              '',
              `**${comparison.commits.length} commit(s) ahead of main**`,
              '',
              '### Commits inclus',
              commitList || '_(aucun)_',
              '',
              '---',
              '_Cette PR est cree automatiquement par .github/workflows/auto-pr-to-main.yml._',
              '_Auto-merge active : sera mergee des que les CI passent._',
            ].join('\n');

            let pr;
            if (existing.length === 0) {
              const { data: created } = await github.rest.pulls.create({
                owner, repo,
                title: `Deploy: ${comparison.commits.length} commit(s) develop → main`,
                head: 'develop',
                base: 'main',
                body,
              });
              pr = created;
              core.info(`Created PR #${pr.number}`);
            } else {
              pr = existing[0];
              await github.rest.pulls.update({
                owner, repo, pull_number: pr.number,
                title: `Deploy: ${comparison.commits.length} commit(s) develop → main`,
                body,
              });
              core.info(`Updated PR #${pr.number}`);
            }

            core.setOutput('pr_number', pr.number);
            core.setOutput('pr_node_id', pr.node_id);

      # Auto-merge desactive volontairement pour Epic 4 (UI client).
      # Le user merge manuellement apres validation visuelle preview.
      # Pour reactiver auto-merge plus tard, decommenter le step ci-dessous.
